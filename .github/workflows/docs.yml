name: Documentation

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Install wasm workload
        run: dotnet workload install wasm-tools

      - name: Build docs
        run: docfx docfx.json

      - name: Write DeepSeek settings for web demo
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python3 <<'PY'
          import json, os
          p = "examples/DotKernel.AvaExample/appsettings.json"
          d = {
              "DeepSeek": {
                  "ApiKey": os.environ.get("DEEPSEEK_API_KEY", ""),
                  "Endpoint": "https://api.deepseek.com",
                  "ModelId": "deepseek-chat",
              }
          }
          with open(p, "w") as f:
              json.dump(d, f, indent=2)
              f.write("\n")
          PY

      - name: Publish WASM demo
        run: dotnet publish examples/DotKernel.AvaExample.Browser/DotKernel.AvaExample.Browser.csproj -c Release

      - name: Merge WASM demo into site
        run: |
          mkdir -p _site/demo
          cp -r examples/DotKernel.AvaExample.Browser/bin/Release/net10.0-browser/publish/wwwroot/. _site/demo/
          BUILD_ID="${{ github.sha }}"
          sed -i 's|<head>|<head>\n    <base href="/DotKernel/demo/" />|' _site/demo/index.html
          sed -i "s|\./main.js|\./main.js?v=${BUILD_ID}|g" _site/demo/index.html
          sed -i "s|'\./_framework/dotnet.js'|'./_framework/dotnet.js?v=${BUILD_ID}'|g" _site/demo/main.js
          cp _site/demo/index.html _site/demo/404.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
